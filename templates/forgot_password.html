{% extends "layout.html" %}

{% block title %}忘记密码 - {% endblock %}

{% block nav_links %}
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>忘记密码</h2>
        <p class="auth-description">请输入您的邮箱地址，我们将向您发送密码重置链接。</p>
        
        <form id="forgot-password-form" class="auth-form">
            <div class="form-group">
                <label for="email">邮箱地址</label>
                <input type="email" id="email" name="email" required placeholder="请输入您的邮箱地址">
            </div>
            
            <button type="submit" class="btn btn-primary">发送重置链接</button>
        </form>
        
        <div class="auth-links">
            <a href="/login" class="auth-link">返回登录</a>
            <a href="/register" class="auth-link">注册账号</a>
        </div>
    </div>
</div>

<style>
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 60px);
    padding: 2rem;
}

.auth-card {
    background: white;
    padding: 2rem;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    width: 100%;
    max-width: 400px;
}

.auth-card h2 {
    text-align: center;
    margin-bottom: 1rem;
    color: #333;
}

.auth-description {
    text-align: center;
    margin-bottom: 2rem;
    color: #666;
    font-size: 0.9rem;
}

.auth-form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group label {
    margin-bottom: 0.5rem;
    font-weight: 500;
    color: #333;
}

.form-group input {
    padding: 0.75rem;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 1rem;
    transition: border-color 0.3s;
}

.form-group input:focus {
    outline: none;
    border-color: #667eea;
}

.btn {
    padding: 0.75rem 1rem;
    border: none;
    border-radius: 5px;
    font-size: 1rem;
    cursor: pointer;
    transition: background-color 0.3s;
}

.btn-primary {
    background-color: #667eea;
    color: white;
}

.btn-primary:hover {
    background-color: #5a6fd8;
}

.auth-links {
    display: flex;
    justify-content: space-between;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid #eee;
}

.auth-link {
    color: #667eea;
    text-decoration: none;
    font-size: 0.9rem;
}

.auth-link:hover {
    text-decoration: underline;
}

.error-message {
    color: #e74c3c;
    font-size: 0.9rem;
    margin-top: 0.5rem;
    display: none;
}

.success-message {
    color: #27ae60;
    font-size: 0.9rem;
    margin-top: 0.5rem;
    display: none;
}
</style>

<script>
document.getElementById('forgot-password-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const submitBtn = e.target.querySelector('button[type="submit"]');
    const errorMsg = document.querySelector('.error-message') || createErrorMessage();
    const successMsg = document.querySelector('.success-message') || createSuccessMessage();
    
    // 隐藏之前的消息
    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';
    
    // 禁用按钮
    submitBtn.disabled = true;
    submitBtn.textContent = '发送中...';
    
    try {
        const response = await fetch('/api/forgot-password', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ email: email })
        });
        
        const result = await response.json();
        
        if (response.ok) {
            successMsg.textContent = '重置链接已发送到您的邮箱，请查收。';
            successMsg.style.display = 'block';
            submitBtn.textContent = '已发送';
            submitBtn.disabled = true;
            
            // 3秒后跳转到登录页面
            setTimeout(() => {
                window.location.href = '/login';
            }, 3000);
        } else {
            errorMsg.textContent = result.message || '发送失败，请重试。';
            errorMsg.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = '发送重置链接';
        }
    } catch (error) {
        errorMsg.textContent = '网络错误，请重试。';
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = '发送重置链接';
    }
});

function createErrorMessage() {
    const msg = document.createElement('div');
    msg.className = 'error-message';
    document.getElementById('forgot-password-form').appendChild(msg);
    return msg;
}

function createSuccessMessage() {
    const msg = document.createElement('div');
    msg.className = 'success-message';
    document.getElementById('forgot-password-form').appendChild(msg);
    return msg;
}
</script>
{% endblock %}
