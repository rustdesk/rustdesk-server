{% extends "layout.html" %} {% block title %}忘记密码 - {% endblock %} {% block
nav_links %}{% endblock %} {% block extra_css %}
<style>
    /* 让 auth 页撑满视口，覆盖 .page 默认内边距 */
    .page {
        padding: 0;
    }

    .auth-wrap {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - var(--nav-h));
        padding: 24px;
    }

    .auth-card {
        background: var(--surface);
        border-radius: var(--radius);
        box-shadow: var(--shadow-l);
        padding: 40px 36px;
        width: 100%;
        max-width: 380px;
    }

    .auth-icon {
        font-size: 40px;
        margin-bottom: 16px;
        display: block;
        text-align: center;
    }

    .auth-title {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.5px;
        color: var(--text);
        text-align: center;
        margin-bottom: 4px;
    }

    .auth-sub {
        font-size: 14px;
        color: var(--text2);
        text-align: center;
        margin-bottom: 28px;
    }

    .btn-full {
        width: 100%;
        margin-top: 4px;
        padding: 12px;
        font-size: 15px;
        border-radius: var(--radius-s);
    }

    .auth-footer {
        margin-top: 20px;
        text-align: center;
        font-size: 14px;
        color: var(--text2);
    }

    .auth-footer a {
        color: var(--blue);
        text-decoration: none;
    }

    .auth-footer a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %} {% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <span class="auth-icon">🔑</span>
        <h1 class="auth-title">忘记密码</h1>
        <p class="auth-sub">输入邮箱，我们将发送重置链接</p>

        <form id="forgot-password-form">
            <div class="form-group">
                <label for="email">邮箱地址</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    placeholder="请输入您的邮箱地址"
                    autocomplete="email"
                />
            </div>

            <button type="submit" class="btn btn-primary btn-full">
                发送重置链接
            </button>
        </form>

        <div class="auth-footer">
            <a href="/login">返回登录</a>
        </div>
    </div>
</div>
{% endblock %} {% block extra_js %}
<script>
    document
        .getElementById("forgot-password-form")
        .addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const submitBtn = e.target.querySelector('button[type="submit"]');

            // 禁用按钮，防止重复提交
            submitBtn.disabled = true;
            submitBtn.textContent = "发送中...";

            try {
                const response = await fetch("/api/forgot-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email }),
                });

                const result = await response.json();

                if (response.ok) {
                    showSuccess("重置链接已发送到您的邮箱，请查收。");
                    submitBtn.textContent = "已发送";

                    // 3 秒后跳转到登录页面
                    setTimeout(() => {
                        window.location.href = "/login";
                    }, 3000);
                } else {
                    showError(result.message || "发送失败，请重试。");
                    submitBtn.disabled = false;
                    submitBtn.textContent = "发送重置链接";
                }
            } catch (error) {
                showError("网络错误，请重试。");
                submitBtn.disabled = false;
                submitBtn.textContent = "发送重置链接";
            }
        });
</script>
{% endblock %}
