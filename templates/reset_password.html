{% extends "layout.html" %} {% block title %}重置密码 - {% endblock %} {% block
nav_links %}{% endblock %} {% block extra_css %}
<style>
    /* 让 auth 页撑满视口，覆盖 .page 默认内边距 */
    .page {
        padding: 0;
    }

    .auth-wrap {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - var(--nav-h));
        padding: 24px;
    }

    .auth-card {
        background: var(--surface);
        border-radius: var(--radius);
        box-shadow: var(--shadow-l);
        padding: 40px 36px;
        width: 100%;
        max-width: 380px;
    }

    .auth-icon {
        font-size: 40px;
        margin-bottom: 16px;
        display: block;
        text-align: center;
    }

    .auth-title {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.5px;
        color: var(--text);
        text-align: center;
        margin-bottom: 4px;
    }

    .auth-sub {
        font-size: 14px;
        color: var(--text2);
        text-align: center;
        margin-bottom: 28px;
    }

    .btn-full {
        width: 100%;
        margin-top: 4px;
        padding: 12px;
        font-size: 15px;
        border-radius: var(--radius-s);
    }

    .auth-footer {
        margin-top: 20px;
        text-align: center;
        font-size: 14px;
        color: var(--text2);
    }

    .auth-footer a {
        color: var(--blue);
        text-decoration: none;
    }

    .auth-footer a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %} {% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <span class="auth-icon">🔒</span>
        <h1 class="auth-title">重置密码</h1>
        <p class="auth-sub">请设置您的新密码</p>

        <form id="reset-password-form">
            <!-- token 由 JS 从 URL 参数读取后写入 -->
            <input type="hidden" id="token" name="token" value="{{ token }}" />

            <div class="form-group">
                <label for="password">新密码</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    placeholder="请输入新密码"
                    autocomplete="new-password"
                />
            </div>

            <div class="form-group">
                <label for="confirm-password">确认密码</label>
                <input
                    type="password"
                    id="confirm-password"
                    name="confirm-password"
                    required
                    placeholder="请再次输入新密码"
                    autocomplete="new-password"
                />
            </div>

            <button type="submit" class="btn btn-primary btn-full">
                重置密码
            </button>
        </form>

        <div class="auth-footer">
            <a href="/login">返回登录</a>
        </div>
    </div>
</div>
{% endblock %} {% block extra_js %}
<script>
    document
        .getElementById("reset-password-form")
        .addEventListener("submit", async (e) => {
            e.preventDefault();

            const token = document.getElementById("token").value;
            const password = document.getElementById("password").value;
            const confirmPassword =
                document.getElementById("confirm-password").value;
            const submitBtn = e.target.querySelector('button[type="submit"]');

            // 验证密码
            if (password.length < 6) {
                showError("密码长度至少为 6 位");
                return;
            }

            if (password !== confirmPassword) {
                showError("两次输入的密码不一致");
                return;
            }

            // 禁用按钮，防止重复提交
            submitBtn.disabled = true;
            submitBtn.textContent = "重置中...";

            try {
                const response = await fetch("/api/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token, password }),
                });

                const result = await response.json();

                if (response.ok) {
                    showSuccess("密码重置成功，正在跳转到登录页面...");
                    submitBtn.textContent = "重置成功";

                    // 2 秒后跳转到登录页面
                    setTimeout(() => {
                        window.location.href = "/login";
                    }, 2000);
                } else {
                    showError(result.message || "重置失败，请重试。");
                    submitBtn.disabled = false;
                    submitBtn.textContent = "重置密码";
                }
            } catch (error) {
                showError("网络错误，请重试。");
                submitBtn.disabled = false;
                submitBtn.textContent = "重置密码";
            }
        });

    // 检查 URL 中是否有 token 参数
    window.addEventListener("load", () => {
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get("token");
        if (token) {
            document.getElementById("token").value = token;
        } else {
            // 没有 token，显示错误并禁用表单
            showError("无效的重置链接，请重新申请密码重置。");

            const form = document.getElementById("reset-password-form");
            form.querySelectorAll('input:not([type="hidden"])').forEach(
                (input) => {
                    input.disabled = true;
                },
            );
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = "链接无效";
        }
    });
</script>
{% endblock %}
