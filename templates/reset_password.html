{% extends "layout.html" %}

{% block title %}重置密码 - {% endblock %}

{% block nav_links %}
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>重置密码</h2>
        <p class="auth-description">请输入您的新密码。</p>
        
        <form id="reset-password-form" class="auth-form">
            <input type="hidden" id="token" name="token" value="{{ token }}">
            
            <div class="form-group">
                <label for="password">新密码</label>
                <input type="password" id="password" name="password" required placeholder="请输入新密码">
            </div>
            
            <div class="form-group">
                <label for="confirm-password">确认密码</label>
                <input type="password" id="confirm-password" name="confirm-password" required placeholder="请再次输入新密码">
            </div>
            
            <button type="submit" class="btn btn-primary">重置密码</button>
        </form>
        
        <div class="auth-links">
            <a href="/login" class="auth-link">返回登录</a>
        </div>
    </div>
</div>

<style>
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 60px);
    padding: 2rem;
}

.auth-card {
    background: white;
    padding: 2rem;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    width: 100%;
    max-width: 400px;
}

.auth-card h2 {
    text-align: center;
    margin-bottom: 1rem;
    color: #333;
}

.auth-description {
    text-align: center;
    margin-bottom: 2rem;
    color: #666;
    font-size: 0.9rem;
}

.auth-form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group label {
    margin-bottom: 0.5rem;
    font-weight: 500;
    color: #333;
}

.form-group input {
    padding: 0.75rem;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 1rem;
    transition: border-color 0.3s;
}

.form-group input:focus {
    outline: none;
    border-color: #667eea;
}

.btn {
    padding: 0.75rem 1rem;
    border: none;
    border-radius: 5px;
    font-size: 1rem;
    cursor: pointer;
    transition: background-color 0.3s;
}

.btn-primary {
    background-color: #667eea;
    color: white;
}

.btn-primary:hover {
    background-color: #5a6fd8;
}

.auth-links {
    display: flex;
    justify-content: center;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid #eee;
}

.auth-link {
    color: #667eea;
    text-decoration: none;
    font-size: 0.9rem;
}

.auth-link:hover {
    text-decoration: underline;
}

.error-message {
    color: #e74c3c;
    font-size: 0.9rem;
    margin-top: 0.5rem;
    display: none;
}

.success-message {
    color: #27ae60;
    font-size: 0.9rem;
    margin-top: 0.5rem;
    display: none;
}
</style>

<script>
document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const token = document.getElementById('token').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm-password').value;
    const submitBtn = e.target.querySelector('button[type="submit"]');
    const errorMsg = document.querySelector('.error-message') || createErrorMessage();
    const successMsg = document.querySelector('.success-message') || createSuccessMessage();
    
    // 隐藏之前的消息
    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';
    
    // 验证密码
    if (password.length < 6) {
        errorMsg.textContent = '密码长度至少为6位';
        errorMsg.style.display = 'block';
        return;
    }
    
    if (password !== confirmPassword) {
        errorMsg.textContent = '两次输入的密码不一致';
        errorMsg.style.display = 'block';
        return;
    }
    
    // 禁用按钮
    submitBtn.disabled = true;
    submitBtn.textContent = '重置中...';
    
    try {
        const response = await fetch('/api/reset-password', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ 
                token: token,
                password: password 
            })
        });
        
        const result = await response.json();
        
        if (response.ok) {
            successMsg.textContent = '密码重置成功，正在跳转到登录页面...';
            successMsg.style.display = 'block';
            submitBtn.textContent = '重置成功';
            submitBtn.disabled = true;
            
            // 2秒后跳转到登录页面
            setTimeout(() => {
                window.location.href = '/login';
            }, 2000);
        } else {
            errorMsg.textContent = result.message || '重置失败，请重试。';
            errorMsg.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = '重置密码';
        }
    } catch (error) {
        errorMsg.textContent = '网络错误，请重试。';
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = '重置密码';
    }
});

function createErrorMessage() {
    const msg = document.createElement('div');
    msg.className = 'error-message';
    document.getElementById('reset-password-form').appendChild(msg);
    return msg;
}

function createSuccessMessage() {
    const msg = document.createElement('div');
    msg.className = 'success-message';
    document.getElementById('reset-password-form').appendChild(msg);
    return msg;
}

// 检查URL中是否有token参数
window.addEventListener('load', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    if (token) {
        document.getElementById('token').value = token;
    } else {
        // 如果没有token，显示错误信息
        const errorMsg = document.querySelector('.error-message') || createErrorMessage();
        errorMsg.textContent = '无效的重置链接，请重新申请密码重置。';
        errorMsg.style.display = 'block';
        
        // 禁用表单
        const form = document.getElementById('reset-password-form');
        const inputs = form.querySelectorAll('input');
        const submitBtn = form.querySelector('button[type="submit"]');
        
        inputs.forEach(input => {
            if (input.type !== 'hidden') {
                input.disabled = true;
            }
        });
        submitBtn.disabled = true;
        submitBtn.textContent = '链接无效';
    }
});
</script>
{% endblock %}
