{% extends "layout.html" %} {% block title %}用户管理 - {% endblock %} {% block
nav_links %}
<a href="/dashboard">控制台</a>
<a href="/devices">设备管理</a>
<a href="/users" class="active nav-admin-only" style="display: none"
    >用户管理</a
>
<a href="/monitor">连接监控</a>
{% endblock %} {% block extra_css %}
<style>
    /* 角色切换下拉框 */
    .role-select {
        font-size: 12px;
        padding: 3px 6px;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-xs);
        background: var(--surface2);
        color: var(--text);
        cursor: pointer;
        outline: none;
        margin-left: 6px;
    }
    .role-select:focus {
        border-color: var(--blue);
    }
    .row-actions {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        align-items: center;
    }
</style>
{% endblock %} {% block content %}

<!-- 工具栏 -->
<div class="toolbar">
    <div class="toolbar-left">
        <input
            class="search-input"
            type="text"
            id="search-input"
            placeholder="按用户名或邮箱筛选…"
            oninput="filterUsers()"
        />
    </div>
    <div class="toolbar-right">
        <button type="button" class="btn btn-secondary" onclick="loadUsers()">
            刷新
        </button>
        <button
            type="button"
            class="btn btn-primary"
            onclick="showCreateModal()"
        >
            + 创建用户
        </button>
    </div>
</div>

<!-- 用户表格 -->
<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>用户名</th>
                <th>邮箱</th>
                <th>角色</th>
                <th>状态</th>
                <th>注册时间</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="users-tbody">
            <tr>
                <td colspan="6" style="text-align: center; color: var(--text2)">
                    加载中…
                </td>
            </tr>
        </tbody>
    </table>
</div>

<!-- 创建用户模态框 -->
<div class="modal-overlay" id="create-user-modal">
    <div class="modal-box">
        <div class="modal-title">创建用户</div>
        <form id="create-user-form">
            <div class="form-group">
                <label for="cu-username">用户名</label>
                <input
                    type="text"
                    id="cu-username"
                    required
                    autocomplete="username"
                    minlength="2"
                    placeholder="至少 2 个字符"
                />
            </div>
            <div class="form-group">
                <label for="cu-email">邮箱</label>
                <input
                    type="email"
                    id="cu-email"
                    required
                    autocomplete="email"
                    placeholder="user@example.com"
                />
            </div>
            <div class="form-group">
                <label for="cu-password">密码</label>
                <input
                    type="password"
                    id="cu-password"
                    required
                    autocomplete="new-password"
                    minlength="6"
                    placeholder="至少 6 位"
                />
            </div>
            <div class="form-group">
                <label for="cu-password2">确认密码</label>
                <input
                    type="password"
                    id="cu-password2"
                    required
                    autocomplete="new-password"
                    minlength="6"
                    placeholder="再次输入密码"
                />
            </div>
            <div class="modal-footer">
                <button
                    type="button"
                    class="btn btn-secondary"
                    onclick="hideCreateModal()"
                >
                    取消
                </button>
                <button type="submit" class="btn btn-primary">创建</button>
            </div>
        </form>
    </div>
</div>

<!-- 编辑用户模态框 -->
<div class="modal-overlay" id="edit-user-modal">
    <div class="modal-box">
        <div class="modal-title">编辑用户</div>
        <form id="edit-user-form">
            <input type="hidden" id="eu-id" />
            <div class="form-group">
                <label for="eu-username">用户名</label>
                <input
                    type="text"
                    id="eu-username"
                    required
                    autocomplete="username"
                    placeholder="用户名"
                />
            </div>
            <div class="form-group">
                <label for="eu-email">邮箱</label>
                <input
                    type="email"
                    id="eu-email"
                    required
                    autocomplete="email"
                    placeholder="user@example.com"
                />
            </div>
            <div class="modal-footer">
                <button
                    type="button"
                    class="btn btn-secondary"
                    onclick="hideEditModal()"
                >
                    取消
                </button>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

{% endblock %} {% block extra_js %}
<script>
    let allUsers = [];
    let currentUser = null;

    function escapeHtml(s) {
        return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }

    function authHeaders() {
        const token = localStorage.getItem("jwt_token");
        return {
            "Content-Type": "application/json",
            Authorization: "Bearer " + (token || ""),
        };
    }

    function formatTime(iso) {
        if (!iso) return "—";
        try {
            const d = new Date(iso);
            if (isNaN(d.getTime())) return escapeHtml(iso);
            return escapeHtml(d.toLocaleString());
        } catch (e) {
            return escapeHtml(iso);
        }
    }

    document.addEventListener("DOMContentLoaded", function () {
        currentUser = checkAuth();
        if (!currentUser) return;
        if (currentUser.role !== "admin") {
            showError("需要管理员权限");
            setTimeout(function () {
                window.location.href = "/dashboard";
            }, 1200);
            return;
        }
        document.querySelectorAll(".nav-admin-only").forEach(function (el) {
            el.style.display = "";
        });
        loadUsers();
    });

    async function loadUsers() {
        const tbody = document.getElementById("users-tbody");
        try {
            const res = await fetch("/api/users?limit=500&offset=0", {
                headers: authHeaders(),
            });
            if (res.status === 401) {
                showError("登录已失效，请重新登录");
                setTimeout(function () {
                    window.location.href = "/login";
                }, 1500);
                return;
            }
            if (res.status === 403) {
                showError("需要管理员权限");
                setTimeout(function () {
                    window.location.href = "/dashboard";
                }, 1500);
                return;
            }
            const result = await res.json();
            if (!result.success) {
                tbody.innerHTML =
                    '<tr><td colspan="6" style="text-align:center;color:var(--red);">' +
                    escapeHtml(result.message || "加载失败") +
                    "</td></tr>";
                return;
            }
            allUsers = result.data || [];
            filterUsers();
        } catch (e) {
            console.error(e);
            tbody.innerHTML =
                '<tr><td colspan="6" style="text-align:center;color:var(--red);">加载失败</td></tr>';
        }
    }

    function filterUsers() {
        const term = document
            .getElementById("search-input")
            .value.trim()
            .toLowerCase();
        let list = allUsers;
        if (term) {
            list = allUsers.filter(function (u) {
                return (
                    (u.username || "").toLowerCase().includes(term) ||
                    (u.email || "").toLowerCase().includes(term)
                );
            });
        }
        renderUsers(list);
    }

    function renderUsers(list) {
        const tbody = document.getElementById("users-tbody");
        if (!list.length) {
            tbody.innerHTML =
                '<tr><td colspan="6">' +
                '<div class="empty-state"><div class="empty-icon">👥</div><p>暂无用户</p></div>' +
                "</td></tr>";
            return;
        }
        let html = "";
        list.forEach(function (u) {
            const active = u.is_active !== false;
            const badge = active
                ? '<span class="badge badge-green">活跃</span>'
                : '<span class="badge badge-red">禁用</span>';
            const isAdm = (u.role || "user") === "admin";
            const roleBadge = isAdm
                ? '<span class="badge badge-blue">管理员</span>'
                : '<span class="badge badge-gray">普通用户</span>';

            let roleCell = "<td>" + roleBadge;
            if (String(u.id) !== String(currentUser.id)) {
                roleCell +=
                    '<select class="role-select" data-id="' +
                    u.id +
                    '">' +
                    '<option value="user"' +
                    (!isAdm ? " selected" : "") +
                    ">普通用户</option>" +
                    '<option value="admin"' +
                    (isAdm ? " selected" : "") +
                    ">管理员</option>" +
                    "</select>";
            }
            roleCell += "</td>";

            html +=
                '<tr data-id="' +
                u.id +
                '">' +
                '<td style="font-weight:500">' +
                escapeHtml(u.username || "") +
                "</td>" +
                '<td style="color:var(--text2)">' +
                escapeHtml(u.email || "") +
                "</td>" +
                roleCell +
                "<td>" +
                badge +
                "</td>" +
                '<td style="color:var(--text2);font-size:13px">' +
                formatTime(u.created_at) +
                "</td>" +
                '<td class="row-actions">' +
                '<button type="button" class="btn btn-xs btn-secondary" data-action="edit">编辑</button>' +
                '<button type="button" class="btn btn-xs btn-danger" data-action="del">删除</button>' +
                "</td></tr>";
        });
        tbody.innerHTML = html;

        tbody
            .querySelectorAll('button[data-action="edit"]')
            .forEach(function (btn) {
                btn.addEventListener("click", function () {
                    const tr = btn.closest("tr");
                    const id = parseInt(tr.getAttribute("data-id"), 10);
                    const u = allUsers.find(function (x) {
                        return x.id === id;
                    });
                    if (u) openEditModal(u);
                });
            });
        tbody
            .querySelectorAll('button[data-action="del"]')
            .forEach(function (btn) {
                btn.addEventListener("click", function () {
                    const tr = btn.closest("tr");
                    const id = parseInt(tr.getAttribute("data-id"), 10);
                    const u = allUsers.find(function (x) {
                        return x.id === id;
                    });
                    if (u) deleteUser(u);
                });
            });
        tbody.querySelectorAll("select.role-select").forEach(function (sel) {
            sel.addEventListener("change", function () {
                changeUserRole(sel);
            });
        });
    }

    async function changeUserRole(sel) {
        const id = parseInt(sel.getAttribute("data-id"), 10);
        const role = sel.value;
        try {
            const res = await fetch(
                "/api/users/" + encodeURIComponent(id) + "/role",
                {
                    method: "PUT",
                    headers: authHeaders(),
                    body: JSON.stringify({ role: role }),
                },
            );
            const result = await res.json();
            if (!result.success) {
                showError(result.message || "更新角色失败");
                await loadUsers();
                return;
            }
            showSuccess("角色已更新");
            if (currentUser && String(currentUser.id) === String(id)) {
                currentUser.role = role;
                localStorage.setItem("user_info", JSON.stringify(currentUser));
            }
            await loadUsers();
        } catch (err) {
            console.error(err);
            showError("更新角色失败");
            await loadUsers();
        }
    }

    function showCreateModal() {
        document.getElementById("create-user-modal").classList.add("open");
    }

    function hideCreateModal() {
        document.getElementById("create-user-modal").classList.remove("open");
        document.getElementById("create-user-form").reset();
    }

    document
        .getElementById("create-user-form")
        .addEventListener("submit", async function (e) {
            e.preventDefault();
            const username = document
                .getElementById("cu-username")
                .value.trim();
            const email = document.getElementById("cu-email").value.trim();
            const password = document.getElementById("cu-password").value;
            const confirm_password =
                document.getElementById("cu-password2").value;
            if (password !== confirm_password) {
                showError("两次输入的密码不一致");
                return;
            }
            try {
                const res = await fetch("/api/users", {
                    method: "POST",
                    headers: authHeaders(),
                    body: JSON.stringify({
                        username,
                        email,
                        password,
                        confirm_password,
                    }),
                });
                const result = await res.json();
                if (!result.success) {
                    showError(result.message || "创建失败");
                    return;
                }
                hideCreateModal();
                showSuccess("用户已创建");
                await loadUsers();
            } catch (err) {
                console.error(err);
                showError("创建用户失败");
            }
        });

    function openEditModal(u) {
        document.getElementById("eu-id").value = String(u.id);
        document.getElementById("eu-username").value = u.username || "";
        document.getElementById("eu-email").value = u.email || "";
        document.getElementById("edit-user-modal").classList.add("open");
    }

    function hideEditModal() {
        document.getElementById("edit-user-modal").classList.remove("open");
        document.getElementById("edit-user-form").reset();
    }

    document
        .getElementById("edit-user-form")
        .addEventListener("submit", async function (e) {
            e.preventDefault();
            const id = document.getElementById("eu-id").value;
            const username = document
                .getElementById("eu-username")
                .value.trim();
            const email = document.getElementById("eu-email").value.trim();
            try {
                const res = await fetch(
                    "/api/users/" + encodeURIComponent(id),
                    {
                        method: "PUT",
                        headers: authHeaders(),
                        body: JSON.stringify({
                            username: username,
                            email: email,
                        }),
                    },
                );
                if (res.status === 401 || res.status === 403) {
                    showError("无权限或登录已失效");
                    return;
                }
                const result = await res.json();
                if (!result.success) {
                    showError(result.message || "保存失败");
                    return;
                }
                hideEditModal();
                showSuccess("已保存");
                if (currentUser && String(currentUser.id) === String(id)) {
                    const u = result.data;
                    if (u) {
                        currentUser.username = u.username;
                        currentUser.email = u.email;
                        localStorage.setItem(
                            "user_info",
                            JSON.stringify(currentUser),
                        );
                        const uh = document.querySelector(".nav-user");
                        if (uh) uh.textContent = currentUser.username;
                    }
                }
                await loadUsers();
            } catch (err) {
                console.error(err);
                showError("保存失败");
            }
        });

    async function deleteUser(u) {
        if (!confirm("确定删除用户「" + u.username + "」吗？此操作不可恢复。"))
            return;
        try {
            const res = await fetch("/api/users/" + encodeURIComponent(u.id), {
                method: "DELETE",
                headers: authHeaders(),
            });
            if (res.status === 401 || res.status === 403) {
                showError("无权限或登录已失效");
                return;
            }
            const result = await res.json();
            if (!result.success) {
                showError(result.message || "删除失败");
                return;
            }
            showSuccess("已删除");
            if (currentUser && String(currentUser.id) === String(u.id)) {
                logout();
                return;
            }
            await loadUsers();
        } catch (err) {
            console.error(err);
            showError("删除失败");
        }
    }

    /* 点击遮罩层关闭对应模态框 */
    document
        .getElementById("create-user-modal")
        .addEventListener("click", function (ev) {
            if (ev.target === this) hideCreateModal();
        });
    document
        .getElementById("edit-user-modal")
        .addEventListener("click", function (ev) {
            if (ev.target === this) hideEditModal();
        });
</script>
{% endblock %}
