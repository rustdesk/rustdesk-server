{% extends "layout.html" %}
{% block title %}我的订阅 - {% endblock %}

{% block nav_links %}
<a href="/dashboard">控制台</a>
<a href="/devices">设备管理</a>
<a href="/subscription" class="active">我的订阅</a>
<a href="/users" class="nav-admin-only" style="display:none">用户管理</a>
<a href="/monitor">连接监控</a>
{% endblock %}

{% block extra_css %}
<style>
    .plan-hero {
        background: var(--surface);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 28px;
        margin-bottom: 28px;
    }
    .plan-hero-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
    }
    .plan-tag {
        display: inline-block;
        padding: 4px 14px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: 600;
    }
    .plan-tag-free       { background: rgba(52,199,89,0.12);  color: #1a8a37; }
    .plan-tag-basic      { background: rgba(0,113,227,0.10);  color: #0059b3; }
    .plan-tag-pro        { background: rgba(175,82,222,0.12); color: #7d28b5; }
    .plan-tag-enterprise { background: rgba(255,149,0,0.12);  color: #c47400; }

    .plan-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 20px;
    }
    .plan-stat label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--text2);
        text-transform: uppercase;
        letter-spacing: 0.4px;
        margin-bottom: 6px;
    }
    .plan-stat .val {
        font-size: 20px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.3px;
    }
    .plan-stat .val.warn  { color: var(--orange); }
    .plan-stat .val.danger { color: var(--red); }
    .progress-track {
        margin-top: 8px;
        height: 6px;
        border-radius: 3px;
        background: var(--border);
        overflow: hidden;
    }
    .progress-fill {
        height: 100%;
        border-radius: 3px;
        background: var(--blue);
        transition: width 0.4s;
    }
    .progress-fill.warn   { background: var(--orange); }
    .progress-fill.danger { background: var(--red); }

    .section-heading {
        font-size: 17px;
        font-weight: 600;
        color: var(--text);
        letter-spacing: -0.2px;
        margin-bottom: 16px;
    }

    .plans-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 14px;
    }
    .plan-card {
        background: var(--surface);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 22px;
        text-align: center;
        border: 2px solid transparent;
        transition: box-shadow 0.2s, border-color 0.2s;
    }
    .plan-card.current {
        border-color: var(--blue);
    }
    .plan-card-name {
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 8px;
    }
    .plan-price {
        font-size: 26px;
        font-weight: 700;
        color: var(--blue);
        letter-spacing: -0.5px;
        margin-bottom: 16px;
    }
    .plan-price span {
        font-size: 13px;
        font-weight: 400;
        color: var(--text2);
    }
    .plan-features {
        list-style: none;
        margin: 0 0 18px;
        text-align: left;
    }
    .plan-features li {
        padding: 4px 0;
        font-size: 13px;
        color: var(--text2);
    }
    .plan-features li::before {
        content: "✓  ";
        color: var(--green);
        font-weight: 600;
    }
</style>
{% endblock %}

{% block content %}
<!-- 当前套餐卡片 -->
<div class="plan-hero" id="plan-hero">
    <div style="text-align:center;color:var(--text3);padding:32px 0">加载中…</div>
</div>

<!-- 套餐对比 -->
<div class="section-heading">套餐对比</div>
<div class="plans-grid" id="plans-grid">
    <div style="text-align:center;color:var(--text3);padding:32px 0;grid-column:1/-1">加载中…</div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const user = checkAuth();
        if (!user) return;
        if (user.role === "admin") {
            document.querySelectorAll(".nav-admin-only").forEach(function (el) {
                el.style.display = "";
            });
        }
        loadData();
    });

    function authHeaders() {
        return { Authorization: "Bearer " + (localStorage.getItem("jwt_token") || "") };
    }

    async function loadData() {
        try {
            const [myRes, plansRes] = await Promise.all([
                fetch("/api/subscription/my",    { headers: authHeaders() }),
                fetch("/api/subscription/plans", { headers: authHeaders() }),
            ]);
            const my    = await myRes.json();
            const plans = await plansRes.json();
            if (my.success !== false) renderHero(my.data || my);
            renderPlans((plans.plans || plans.data || []), my.data || my);
        } catch (e) {
            document.getElementById("plan-hero").innerHTML =
                '<div style="text-align:center;color:var(--red);padding:32px 0">加载失败，请刷新重试</div>';
        }
    }

    function planTagClass(name) {
        return { free: "plan-tag-free", basic: "plan-tag-basic",
                 pro: "plan-tag-pro", enterprise: "plan-tag-enterprise" }[name] || "plan-tag-free";
    }

    function renderHero(sub) {
        const limit    = sub.device_limit || 0;
        const used     = sub.current_device_count || 0;
        const pct      = limit > 0 ? Math.min(100, Math.round(used / limit * 100)) : 0;
        const barClass = pct >= 90 ? "danger" : pct >= 70 ? "warn" : "";
        const valClass = pct >= 90 ? "danger" : pct >= 70 ? "warn" : "";

        const deviceText = limit > 0 ? used + " / " + limit + " 台" : used + " 台（不限）";
        const speedText  = sub.speed_limit_kbps > 0
            ? (sub.speed_limit_kbps >= 1024
                ? (sub.speed_limit_kbps / 1024).toFixed(0) + " Mbps"
                : sub.speed_limit_kbps + " Kbps")
            : "不限速";

        let expiryHtml = "";
        if (sub.expires_at) {
            const d = new Date(sub.expires_at);
            const days = Math.ceil((d - Date.now()) / 86400000);
            const cls  = days < 7 ? "danger" : days < 30 ? "warn" : "";
            expiryHtml = `<div class="plan-stat">
                <label>到期时间</label>
                <div class="val ${cls}">${d.toLocaleDateString("zh-CN")}${days < 7 ? "（" + days + " 天后）" : ""}</div>
            </div>`;
        } else {
            expiryHtml = `<div class="plan-stat"><label>到期时间</label><div class="val">永久</div></div>`;
        }

        document.getElementById("plan-hero").innerHTML = `
            <div class="plan-hero-header">
                <span class="plan-tag ${planTagClass(sub.plan_name)}">${escapeHtml(sub.plan_display_name || sub.plan_name)}</span>
                <span style="font-size:13px;color:var(--text2)">当前套餐</span>
            </div>
            <div class="plan-stats">
                <div class="plan-stat">
                    <label>设备使用</label>
                    <div class="val ${valClass}">${deviceText}</div>
                    ${limit > 0 ? `<div class="progress-track"><div class="progress-fill ${barClass}" style="width:${pct}%"></div></div>` : ""}
                </div>
                <div class="plan-stat">
                    <label>速度限制</label>
                    <div class="val">${speedText}</div>
                </div>
                ${expiryHtml}
            </div>`;
    }

    function renderPlans(plans, my) {
        const grid = document.getElementById("plans-grid");
        if (!plans.length) {
            grid.innerHTML = '<div style="text-align:center;color:var(--text3);padding:32px 0;grid-column:1/-1">暂无套餐信息</div>';
            return;
        }
        grid.innerHTML = plans.map(function (p) {
            const isCurrent = p.name === my.plan_name;
            const priceHtml = p.price_monthly > 0
                ? "¥" + p.price_monthly + "<span>/月</span>"
                : "免费";
            const deviceFeat = p.device_limit > 0 ? "最多 " + p.device_limit + " 台设备" : "无限设备";
            const speedFeat  = p.speed_limit_kbps > 0
                ? "限速 " + (p.speed_limit_kbps >= 1024
                    ? (p.speed_limit_kbps / 1024).toFixed(0) + " Mbps"
                    : p.speed_limit_kbps + " Kbps")
                : "不限速";
            const btn = isCurrent
                ? `<button class="btn btn-secondary btn-sm" disabled style="cursor:default;opacity:0.6">当前套餐</button>`
                : `<button class="btn btn-primary btn-sm" onclick="contactAdmin('${escapeHtml(p.display_name)}')">联系管理员升级</button>`;
            return `<div class="plan-card${isCurrent ? " current" : ""}">
                <div class="plan-card-name">${escapeHtml(p.display_name)}</div>
                <div class="plan-price">${priceHtml}</div>
                <ul class="plan-features">
                    <li>${deviceFeat}</li>
                    <li>${speedFeat}</li>
                    ${p.description ? "<li>" + escapeHtml(p.description) + "</li>" : ""}
                </ul>
                ${btn}
            </div>`;
        }).join("");
    }

    function contactAdmin(planName) {
        showInfo("请联系管理员申请升级到【" + planName + "】套餐");
    }
</script>
{% endblock %}
