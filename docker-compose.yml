version: "3.9"

services:
  rustdesk-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rustdesk-server
    restart: unless-stopped
    environment:
      HBBS_PORT: "21116"
      HBBR_PORT: "21117"
      API_PORT: "21114"
      RELAY: "127.0.0.1:21117"
      ENCRYPTED_ONLY: "0"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "admin123456"
      ADMIN_JWT_SECRET: "change-this-secret"
    volumes:
      - ./data:/data
    ports:
      - "21114:21114/tcp"
      - "21116:21116/tcp"
      - "21116:21116/udp"
      - "21117:21117/tcp"
