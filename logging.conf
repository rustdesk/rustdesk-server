# 日志配置文件
# 用于配置系统日志记录

# 日志格式配置
[format]
# 时间格式
timestamp = "%Y-%m-%d %H:%M:%S"

# 日志级别显示
show_level = true

# 显示源文件位置
show_location = true

# 显示模块名
show_module = true

# 日志轮转配置
[rotation]
# 按大小轮转
max_size = "100MB"

# 保留文件数量
max_files = 10

# 轮转间隔
interval = "daily"

# 压缩旧日志
compress = true

# 日志输出配置
[outputs]
# 控制台输出
console = true

# 文件输出
file = true

# 文件路径
file_path = "/var/log/rustdesk/"

# 文件名格式
file_name = "hbbs.log"

# 错误日志单独文件
error_file = "hbbs_error.log"

# 访问日志配置
[access]
# 启用访问日志
enabled = true

# 访问日志文件
file = "hbbs_access.log"

# 访问日志格式
format = "%{timestamp} %{remote_addr} %{method} %{uri} %{status} %{response_time}"

# 性能日志配置
[performance]
# 启用性能日志
enabled = true

# 性能日志文件
file = "hbbs_performance.log"

# 记录间隔（秒）
interval = 60

# 监控指标
[metrics]
# 启用指标收集
enabled = true

# 指标输出文件
file = "hbbs_metrics.log"

# 输出格式（json, prometheus）
format = "json"

# 安全日志配置
[security]
# 启用安全日志
enabled = true

# 安全日志文件
file = "hbbs_security.log"

# 记录事件类型
events = ["login_failed", "banned_ip", "suspicious_activity", "rate_limit_exceeded"]
