# Nginx 配置文件
# 用于反向代理 RustDesk 服务器

# 上游服务器配置
upstream hbbs_backend {
    server 127.0.0.1:21115;
    # 如果有多个 hbbs 实例，可以添加更多服务器
    # server 127.0.0.1:21116;
    # server 127.0.0.1:21117;
}

upstream hbbr_backend {
    server 127.0.0.1:21116;
    # 如果有多个 hbbr 实例，可以添加更多服务器
    # server 127.0.0.1:21117;
    # server 127.0.0.1:21118;
}

upstream api_backend {
    server 127.0.0.1:8080;
    # 如果有多个 API 实例，可以添加更多服务器
    # server 127.0.0.1:8081;
}

# HTTP 服务器配置
server {
    listen 80;
    server_name your-domain.com;

    # 重定向到 HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS 服务器配置
server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL 证书配置
    ssl_certificate /path/to/your/cert.pem;
    ssl_certificate_key /path/to/your/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-AES128-SHA256;
    ssl_prefer_server_ciphers off;

    # 安全头
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # 日志配置
    access_log /var/log/nginx/rustdesk_access.log;
    error_log /var/log/nginx/rustdesk_error.log;

    # 客户端最大请求大小
    client_max_body_size 10M;

    # 代理超时配置
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # API 代理配置
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS 头
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
        
        # 处理预检请求
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # WebSocket 代理配置
    location /ws/ {
        proxy_pass http://hbbr_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 特定配置
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 静态文件服务
    location /static/ {
        alias /path/to/rustdesk/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # 压缩配置
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # 默认代理配置
    location / {
        proxy_pass http://hbbs_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 限制请求频率
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=5r/s;
    
    location /api/ {
        limit_req zone=api burst=20 nodelay;
    }
    
    location / {
        limit_req zone=general burst=10 nodelay;
    }
}

# 监控配置（可选）
server {
    listen 9090;
    server_name localhost;
    
    location /metrics {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        
        proxy_pass http://api_backend/metrics;
    }
    
    location /status {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        
        proxy_pass http://api_backend/status;
    }
}
